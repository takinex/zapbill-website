<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zapbill – Smart Billing App</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #642ca1;
      --primary-glow: rgba(100, 44, 161, 0.45);
      --bg-dark: #0f0b1a;
      --text-muted: #b9b3d6;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(
          circle at top right,
          rgba(100, 44, 161, 0.35),
          transparent 40%
        ),
        linear-gradient(135deg, #0c0916, var(--bg-dark));
      color: var(--white);
      overflow-x:hidden;
    }

    /* ---------- HERO ---------- */
    .hero {
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:60px 24px;
    }

    .content {
      max-width: 720px;
      animation: fadeUp 1s ease forwards;
    }

    .tag {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
    }

    /* ---------- SHIMMER TEXT ---------- */
    h1 {
      font-size: clamp(42px, 5vw, 64px);
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 24px;
    }

    .shimmer {
      background: linear-gradient(
        120deg,
        var(--primary) 20%,
        #ffffff 35%,
        var(--primary) 50%
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
      text-shadow: 0 0 30px var(--primary-glow);
    }

    p {
      font-size: 18px;
      color: var(--text-muted);
      margin-bottom: 40px;
    }

    .cta {
      display: inline-block;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .cta img {
      height: 56px;
    }

    .cta:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 60px var(--primary-glow);
    }

    .custom-btn{
    margin-top:25px;
    padding:15px 34px;
    background:transparent;
    color:white;
    border:2px solid var(--primary);
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    transition:.3s;
}

.custom-btn:hover{
    background:var(--primary);
}

.contact-form{
    display:block;
    margin-top:30px;
    text-align:left;
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(12px);
    padding:24px;
    border-radius:18px;
}

.contact-form h3{
    margin-bottom:20px;
    text-align:center;
}

.contact-form input,
.contact-form textarea{
    width:100%;
    margin-bottom:16px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,.08);
    color:white;
    font-size:15px;
}

.contact-form textarea{
    height:120px;
    resize:vertical;
}

.contact-form input::placeholder,
.contact-form textarea::placeholder{
    color:#bbb;
}

.submit-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:var(--primary);
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
}

.submit-btn:hover{
    opacity:.9;
}

   
    /* ---------- Animations ---------- */
    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-17609344445"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'AW-17609344445');
</script>
  <!-- Event snippet for Page view conversion page -->
<script>
  gtag('event', 'conversion', {
      'send_to': 'AW-17609344445/DTExCNXE1NsbEL2L5cxB',
      'value': 1.0,
      'currency': 'INR'
  });
</script>
</head>
<body>

  <section class="hero">
    <div class="content">
      <img src="logo.png" alt="Logo"   />
<p>
       
      </p>

      <div class="tag">Android Billing & POS App</div>

      <h1>
        Billing Made<br>
        <span class="shimmer">Fast. Simple. Smart.</span>
      </h1>

      <p>
        Zapbill helps shops and small businesses manage invoices,
        quick billing, and daily sales effortlessly on Android devices.
      </p>

      <a class="cta"
         href="https://play.google.com/store/apps/details?id=com.takinex.zapbill"
         target="_blank"
         rel="noopener">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg"
          alt="Get it on Google Play">
      </a>

     <div style="margin-top:30px;">


    <div  class="contact-form">

        <h3>Need customization or have any questions?</h3>

        <form id="contactForm"
      action="https://docs.google.com/forms/d/e/1FAIpQLScuT6qmMZB1jvM4wHPw4Vez6pHiQszINCtpf9mFzP0ajOIgcw/formResponse"
      method="POST"
      target="hidden_iframe">

    <input
        type="text"
        name="entry.1627605324"
        placeholder="Business Name"
        required>

    <input
        type="text"
        name="entry.892204940"
        placeholder="Country"
        required>

    <textarea
        name="entry.894461247"
        placeholder="Tell us about your requirements..."
        required></textarea>

    <button type="submit" class="submit-btn">
        Submit Request
    </button>

</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

    </div>

</div>
      
    </div>
  </section>

<script>



const form = document.getElementById("contactForm");

form.addEventListener("submit", function () {

   
    setTimeout(() => {
      window.location.href = "thank-you.html";
        form.reset();
    }, 1000);

});

</script>
  
</body>
</html>
